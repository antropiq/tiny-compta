<svg
  xmlns="http://www.w3.org/2000/svg"
  width="100"
  height="100"
  viewBox="0 0 100 100"
>
  <!-- Optional: White background -->
  <rect width="100" height="100" fill="#e5e38d" rx="20" />

  <!-- The Surrounding Ring -->
  <circle
    cx="50"
    cy="50"
    r="44"
    fill="none"
    stroke="#585fa1"
    stroke-width="4"
  />

  <!-- The "T" and "c" Group -->
  <g fill="#585fa1" transform="translate(2, 0)">

    <!-- The Big "T" -->
    <path
      d="M 23,25 H 67 V 37 H 51 V 85 H 39 V 37 H 23 Z"
    />

    <!-- The Small "c" (Moved up slightly) -->
    <!-- y coordinates shifted up by 5 units -->
    <path
      d="M 68,60
         A 12,12 0 1,0 68,80"
      fill="none"
      stroke="#585fa1"
      stroke-width="6"
      stroke-linecap="round"
    />

  </g>
</svg>
